slate(287.59375, 196.3671875)"><rect class="basic label-container" style="fill:#85bbf0 !important;stroke:#5d82a8 !important" x="-117.5" y="-88.3671875" width="235" height="176.734375"/><g class="label" style="color:#000000 !important" transform="translate(-87.5, -73.3671875)"><rect/><foreignObject width="175" height="146.734375"><div style="color: rgb(0, 0, 0) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#000000 !important" class="nodeLabel "><p></p><div style="font-weight: bold">HTTP Request Router</div><div style="font-size: 70%; margin-top: 0px">[Component: Python http.server]</div><div style="font-size: 80%; margin-top:10px">Routes loopback API requests,<br />serves UI assets, enforces<br />bearer auth for memory/admin<br />APIs, and applies CORS for<br />allowed origins.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-20-5" data-look="classic" transform="translate(287.59375, 524.6875)"><rect class="basic label-container" style="fill:#85bbf0 !important;stroke:#5d82a8 !important" x="-130" y="-115.953125" width="260" height="231.90625"/><g class="label" style="color:#000000 !important" transform="translate(-100, -100.953125)"><rect/><foreignObject width="200" height="201.90625"><div style="color: rgb(0, 0, 0) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#000000 !important" class="nodeLabel "><p></p><div style="font-weight: bold">Media Artifact Manager</div><div style="font-size: 70%; margin-top: 0px">[Component: Python + sqlite3 + filesystem]</div><div style="font-size: 80%; margin-top:10px">Records media references,<br />validates blob uploads,<br />enforces MIME/size/cache<br />gates, writes blobs<br />atomically, queues public<br />fetch tasks, and purges or<br />rehydrates cache entries.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-27-7" data-look="classic" transform="translate(167.87890625, 1012.1413421630859)"><path d="M0,15.37026337329674 a99.7578125,15.37026337329674 0,0,0 199.515625,0 a99.7578125,15.37026337329674 0,0,0 -199.515625,0 l0,234.66713837329675 a99.7578125,15.37026337329674 0,0,0 199.515625,0 l0,-234.66713837329675" class="basic label-container outer-path" style="fill:#2f95c8 !important;stroke:#20688c !important" label-offset-y="15.37026337329674" transform="translate(-99.7578125, -132.7038325599451)"/><g class="label" style="color:#ffffff !important" transform="translate(-92.2578125, -92.1484375)"><rect/><foreignObject width="184.515625" height="204.296875"><div style="color: rgb(255, 255, 255) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#ffffff !important" class="nodeLabel "><p></p><div style="font-weight: bold">SQLite + FTS5 Database</div><div style="font-size: 70%; margin-top: 0px">[Container: SQLite with FTS5]</div><div style="font-size: 80%; margin-top:10px">Durable relational and<br />full-text store for sources,<br />documents, visits, visit<br />events, snapshots, chunks,<br />chunks_fts, media artifacts,<br />media fetch tasks, policy<br />rules, audit events, and<br />deletion receipts.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-29-9" data-look="classic" transform="translate(407.30859375, 1012.1413421630859)"><path d="M0,14.732005339357224 a89.671875,14.732005339357224 0,0,0 179.34375,0 a89.671875,14.732005339357224 0,0,0 -179.34375,0 l0,176.46638033935722 a89.671875,14.732005339357224 0,0,0 179.34375,0 l0,-176.46638033935722" class="basic label-container outer-path" style="fill:#2f95c8 !important;stroke:#20688c !important" label-offset-y="14.732005339357224" transform="translate(-89.671875, -102.96519550903584)"/><g class="label" style="color:#ffffff !important" transform="translate(-82.171875, -63.3671875)"><rect/><foreignObject width="164.34375" height="146.734375"><div style="color: rgb(255, 255, 255) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#ffffff !important" class="nodeLabel "><p></p><div style="font-weight: bold">Media Blob Cache</div><div style="font-size: 70%; margin-top: 0px">[Container: WSL filesystem]</div><div style="font-size: 80%; margin-top:10px">Bounded and disposable<br />filesystem cache for stored<br />image/video/audio blobs with<br />purge and rehydrate<br />semantics.</div><p></p></span></div></foreignObject></g></g></g></g></g></g></g></g></g><defs><filter id="my-svg-drop-shadow" height="130%" width="130%"><feDropShadow dx="4" dy="4" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs><defs><filter id="my-svg-drop-shadow-small" height="150%" width="150%"><feDropShadow dx="2" dy="2" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs></svg>