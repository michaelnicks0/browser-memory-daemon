<!doctype html>
<html>
  <head><meta charset="utf-8"><title>Browser Memory Daemon Options</title></head>
  <body>
    <h1>Browser Memory Daemon</h1>
    <label>Daemon URL <input id="daemonUrl" value="http://127.0.0.1:8765"></label><br>
    <label>API Token <input id="apiToken" type="password"></label><br>
    <label>Policy mode
      <select id="policyMode">
        <option value="all">all — capture everything Chrome allows, no redaction</option>
        <option value="recall">recall — broad capture with secret redaction</option>
        <option value="balanced">balanced — block high-risk domains/query keys</option>
        <option value="strict">strict — legacy broad privacy filtering</option>
      </select>
    </label><br>
    <label><input id="capturePaused" type="checkbox"> Pause capture</label><br>
    <label><input id="cdpRecorderEnabled" type="checkbox"> Enable CDP media recorder for X/Twitter video</label><br>
    <label>CDP recorder domains <input id="cdpRecorderDomains" value="x.com,twitter.com"></label><br>
    <button id="save">Save</button>
    <pre id="status"></pre>
    <script src="options.js"></script>
  </body>
</html>
