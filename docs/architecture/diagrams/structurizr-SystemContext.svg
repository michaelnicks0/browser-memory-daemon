/foreignObject></g></g><g class="edgeLabel" transform="translate(330.39453125, 643.46875)"><g class="label" data-id="L_4_2_0" transform="translate(-100, -36)"><foreignObject width="200" height="72"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="edgeLabel "><p></p><div>Runs its MV3 extension inside<br />and uses APIs from</div><div style="font-size: 70%"></div><p></p></span></div></foreignObject></g></g><g class="edgeLabel" transform="translate(516.1015625, 814.9296875)"><g class="label" data-id="L_4_3_0" transform="translate(-100, -52.796875)"><foreignObject width="200" height="105.59375"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="edgeLabel "><p></p><div>Captures page refs and<br />fetches browser-side or<br />public media from</div><div style="font-size: 70%">[Chrome DOM/fetch; WSL HTTP(S), data URLs; no Chrome cookies in WSL]</div><p></p></span></div></foreignObject></g></g></g><g class="nodes"><g class="node default  " id="my-svg-flowchart-1-1" data-look="classic" transform="translate(330.23046875, 133.8671875)"><rect class="basic label-container" style="fill:#08427b !important;stroke:#052e56 !important" x="-119.2578125" y="-88.3671875" width="238.515625" height="176.734375"/><g class="label" style="color:#ffffff !important" transform="translate(-89.2578125, -73.3671875)"><rect/><foreignObject width="178.515625" height="146.734375"><div style="color: rgb(255, 255, 255) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#ffffff !important" class="nodeLabel "><p></p><div style="font-weight: bold">Operator</div><div style="font-size: 70%; margin-top: 0px">[Person]</div><div style="font-size: 80%; margin-top:10px">Sole local operator who<br />browses with Windows Chrome<br />and searches, reviews, and<br />deletes local browser-memory<br />records.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-2-3" data-look="classic" transform="translate(204.5234375, 814.9296875)"><rect class="basic label-container" style="fill:#999999 !important;stroke:#6b6b6b !important" x="-116.4140625" y="-97.9609375" width="232.828125" height="195.921875"/><g class="label" style="color:#ffffff !important" transform="translate(-86.4140625, -82.9609375)"><rect/><foreignObject width="172.828125" height="165.921875"><div style="color: rgb(255, 255, 255) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#ffffff !important" class="nodeLabel "><p></p><div style="font-weight: bold">Windows Chrome</div><div style="font-size: 70%; margin-top: 0px">[Software System]</div><div style="font-size: 80%; margin-top:10px">The Windows Chrome runtime<br />that loads web pages, hosts<br />the MV3 extension, runs the<br />local UI in a tab, and<br />exposes Chrome extension<br />APIs.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-3-5" data-look="classic" transform="translate(330.23046875, 1153.0546875)"><rect class="basic label-container" style="fill:#999999 !important;stroke:#6b6b6b !important" x="-130" y="-100.3671875" width="260" height="200.734375"/><g class="label" style="color:#ffffff !important" transform="translate(-100, -85.3671875)"><rect/><foreignObject width="200" height="170.734375"><div style="color: rgb(255, 255, 255) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#ffffff !important" class="nodeLabel "><p></p><div style="font-weight: bold">Web Sites and Media Origins</div><div style="font-size: 70%; margin-top: 0px">[Software System]</div><div style="font-size: 80%; margin-top:10px">External web pages,<br />image/video URLs, and media<br />CDNs that Chrome loads or<br />that sidecars fetch as<br />page-related media.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-4-7" data-look="classic" transform="translate(456.1015625, 481.6015625)"><rect class="basic label-container" style="fill:#1168bd !important;stroke:#0b4884 !important" x="-128.6953125" y="-88.3671875" width="257.390625" height="176.734375"/><g class="label" style="color:#ffffff !important" transform="translate(-98.6953125, -73.3671875)"><rect/><foreignObject width="197.390625" height="146.734375"><div style="color: rgb(255, 255, 255) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#ffffff !important" class="nodeLabel "><p></p><div style="font-weight: bold">Browser Memory Daemon</div><div style="font-size: 70%; margin-top: 0px">[Software System]</div><div style="font-size: 80%; margin-top:10px">Local-first personal recall<br />system that captures Windows<br />Chrome page text/media and<br />exports versioned body-safe X<br />observations.</div><p></p></span></div></foreignObject></g></g></g></g></g></g></g><defs><filter id="my-svg-drop-shadow" height="130%" width="130%"><feDropShadow dx="4" dy="4" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs><defs><filter id="my-svg-drop-shadow-small" height="150%" width="150%"><feDropShadow dx="2" dy="2" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs></svg>