tp://www.w3.org/1999/xhtml" class="labelBkg" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="edgeLabel "><p></p><div>Requires compatible<br />initialized schema through</div><div style="font-size: 70%"></div><p></p></span></div></foreignObject></g></g><g class="edgeLabel" transform="translate(193, 1316.8359375)"><g class="label" data-id="L_25_49_0" transform="translate(-100, -44.3984375)"><foreignObject width="200" height="88.796875"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="edgeLabel "><p></p><div>Validates and advances schema<br />ledger/fingerprint in</div><div style="font-size: 70%">[sqlite3 online backup + transactions]</div><p></p></span></div></foreignObject></g></g></g><g class="nodes"><g class="node default  " id="my-svg-flowchart-23-4" data-look="classic" transform="translate(193, 246.921875)"><rect class="basic label-container" style="fill:#85bbf0 !important;stroke:#1168bd !important" x="-130" y="-163.921875" width="260" height="327.84375"/><g class="label" style="color:#000000 !important" transform="translate(-100, -148.921875)"><rect/><foreignObject width="200" height="297.84375"><div style="color: rgb(0, 0, 0) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#000000 !important" class="nodeLabel "><p></p><div style="font-weight: bold">HTTP Request Router</div><div style="font-size: 70%; margin-top: 0px">[Component: Python http.server + route descriptors]</div><div style="font-size: 80%; margin-top:10px">Adapts BaseHTTPRequestHandler<br />requests through immutable<br />method/path descriptors with<br />static precedence; owns auth,<br />parsing, compatible<br />status/error responses,<br />request IDs, common security<br />headers, redaction-safe<br />telemetry, bounded response<br />streaming, disconnect<br />cleanup, CORS, and finite UI<br />assets.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-24-6" data-look="classic" transform="translate(193, 718.1796875)"><rect class="basic label-container" style="fill:#85bbf0 !important;stroke:#1168bd !important" x="-117.515625" y="-136.3359375" width="235.03125" height="272.671875"/><g class="label" style="color:#000000 !important" transform="translate(-87.515625, -121.3359375)"><rect/><foreignObject width="175.03125" height="242.671875"><div style="color: rgb(0, 0, 0) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#000000 !important" class="nodeLabel "><p></p><div style="font-weight: bold">Application Use Cases</div><div style="font-size: 70%; margin-top: 0px">[Component: Python]</div><div style="font-size: 80%; margin-top:10px">Provides request-independent<br />capture, lifecycle, read,<br />forget, policy, doctor, and<br />media use cases; owns<br />database-ready checks,<br />transaction/audit boundaries,<br />asynchronous media kickoff,<br />and upload/download resource<br />leases without importing HTTP<br />request or response types.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-25-8" data-look="classic" transform="translate(193, 1087.4765625)"><rect class="basic label-container" style="fill:#85bbf0 !important;stroke:#1168bd !important" x="-130" y="-109.9609375" width="260" height="219.921875"/><g class="label" style="color:#000000 !important" transform="translate(-100, -94.9609375)"><rect/><foreignObject width="200" height="189.921875"><div style="color: rgb(0, 0, 0) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#000000 !important" class="nodeLabel "><p></p><div style="font-weight: bold">Database Migration Kernel</div><div style="font-size: 70%; margin-top: 0px">[Component: Python + sqlite3]</div><div style="font-size: 80%; margin-top:10px">Validates exact<br />ledgers/fingerprints and<br />applies transactional steps<br />through version 14, including<br />immutable observation ingest<br />sequences.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-49-1" data-look="classic" transform="translate(193, 1502.656967163086)"><path d="M0,15.37026337329674 a99.7578125,15.37026337329674 0,0,0 199.515625,0 a99.7578125,15.37026337329674 0,0,0 -199.515625,0 l0,177.10463837329675 a99.7578125,15.37026337329674 0,0,0 199.515625,0 l0,-177.10463837329675" class="basic label-container outer-path" style="fill:#2f95c8 !important;stroke:#20688c !important" label-offset-y="15.37026337329674" transform="translate(-99.7578125, -103.92258255994511)"/><g class="label" style="color:#ffffff !important" transform="translate(-92.2578125, -63.3671875)"><rect/><foreignObject width="184.515625" height="146.734375"><div style="color: rgb(255, 255, 255) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#ffffff !important" class="nodeLabel "><p></p><div style="font-weight: bold">SQLite + FTS5 Database</div><div style="font-size: 70%; margin-top: 0px">[Container: SQLite with FTS5]</div><div style="font-size: 80%; margin-top:10px">Durable text/metadata<br />authority including migration<br />ledger, capture observations,<br />and immutable observation<br />ingest sequences.</div><p></p></span></div></foreignObject></g></g></g></g></g></g></g><defs><filter id="my-svg-drop-shadow" height="130%" width="130%"><feDropShadow dx="4" dy="4" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></