.765625" height="24"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table-cell; white-space: nowrap; line-height: 1.5;"><span class="nodeLabel " style="color:#2e6295 !important"><p>WSL Loopback HTTP Daemon</p></span></div></foreignObject></g></g></g><g class="edgePaths"><path d="M193,455.031L193,467.365C193,479.698,193,504.365,193,528.365C193,552.365,193,575.698,193,587.365L193,599.031" id="my-svg-L_23_24_0" class=" edge-thickness-normal edge-pattern-dotted edge-thickness-normal edge-pattern-solid flowchart-link" style="fill:#ffffff;;;fill:#ffffff" data-edge="true" data-et="edge" data-id="L_23_24_0" data-points="W3sieCI6MTkzLCJ5Ijo0NTUuMDMxMjV9LHsieCI6MTkzLCJ5Ijo1MjkuMDMxMjV9LHsieCI6MTkzLCJ5Ijo2MDMuMDMxMjV9XQ==" data-look="classic" marker-end="url(#my-svg_flowchart-v2-pointEnd)"/><path d="M193,957.266L193,965.599C193,973.932,193,990.599,193,1014.665C193,1038.732,193,1070.198,193,1100.997C193,1131.797,193,1161.93,193,1176.996L193,1192.063" id="my-svg-L_24_47_0" class=" edge-thickness-normal edge-pattern-dotted edge-thickness-normal edge-pattern-solid flowchart-link" style="fill:#ffffff;;;fill:#ffffff" data-edge="true" data-et="edge" data-id="L_24_47_0" data-points="W3sieCI6MTkzLCJ5Ijo5NTcuMjY1NjI1fSx7IngiOjE5MywieSI6MTAwNy4yNjU2MjV9LHsieCI6MTkzLCJ5IjoxMTAxLjY2NDA2MjV9LHsieCI6MTkzLCJ5IjoxMTk2LjA2MjV9XQ==" data-look="classic" marker-end="url(#my-svg_flowchart-v2-pointEnd)"/></g><g class="edgeLabels"><g class="edgeLabel" transform="translate(193, 529.03125)"><g class="label" data-id="L_23_24_0" transform="translate(-92.5, -24)"><foreignObject width="185" height="48"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="edgeLabel "><p></p><div>Requires compatible<br />initialized schema through</div><div style="font-size: 70%"></div><p></p></span></div></foreignObject></g></g><g class="edgeLabel" transform="translate(193, 1101.6640625)"><g class="label" data-id="L_24_47_0" transform="translate(-100, -44.3984375)"><foreignObject width="200" height="88.796875"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="edgeLabel "><p></p><div>Validates and advances schema<br />ledger/fingerprint in</div><div style="font-size: 70%">[sqlite3 online backup + transactions]</div><p></p></span></div></foreignObject></g></g></g><g class="nodes"><g class="node default  " id="my-svg-flowchart-23-3" data-look="classic" transform="translate(193, 281.515625)"><rect class="basic label-container" style="fill:#85bbf0 !important;stroke:#1168bd !important" x="-130" y="-173.515625" width="260" height="347.03125"/><g class="label" style="color:#000000 !important" transform="translate(-100, -158.515625)"><rect/><foreignObject width="200" height="317.03125"><div style="color: rgb(0, 0, 0) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#000000 !important" class="nodeLabel "><p></p><div style="font-weight: bold">HTTP Request Router</div><div style="font-size: 70%; margin-top: 0px">[Component: Python http.server + route descriptors]</div><div style="font-size: 80%; margin-top:10px">Matches immutable method/path<br />descriptors with static<br />precedence, maps typed<br />compatible errors, applies<br />opaque request IDs and common<br />security headers, emits<br />redaction-safe<br />route/status/latency<br />telemetry, serves UI assets,<br />enforces bearer auth for<br />memory/admin APIs, and<br />applies CORS for allowed<br />origins.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-24-5" data-look="classic" transform="translate(193, 780.1484375)"><rect class="basic label-container" style="fill:#85bbf0 !important;stroke:#1168bd !important" x="-130" y="-177.1171875" width="260" height="354.234375"/><g class="label" style="color:#000000 !important" transform="translate(-100, -162.1171875)"><rect/><foreignObject width="200" height="324.234375"><div style="color: rgb(0, 0, 0) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#000000 !important" class="nodeLabel "><p></p><div style="font-weight: bold">Database Migration Kernel</div><div style="font-size: 70%; margin-top: 0px">[Component: Python + sqlite3]</div><div style="font-size: 80%; margin-top:10px">Serializes migrators;<br />validates exact schema<br />fingerprints, ordered<br />names/checksums, and PRAGMA<br />user_version; applies<br />transactional steps,<br />backup-gates destructive<br />changes, and expands capture<br />provenance, storage state,<br />one-time historical media<br />correction, plus durable<br />cache reservations through<br />version 13.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-47-7" data-look="classic" transform="translate(193, 1367.141342163086)"><path d="M0,15.37026337329674 a99.7578125,15.37026337329674 0,0,0 199.515625,0 a99.7578125,15.37026337329674 0,0,0 -199.515625,0 l0,311.4171383732967 a99.7578125,15.37026337329674 0,0,0 199.515625,0 l0,-311.4171383732967" class="basic label-container outer-path" style="fill:#2f95c8 !important;stroke:#20688c !important" label-offset-y="15.37026337329674" transform="translate(-99.7578125, -171.0788325599451)"/><g class="label" style="color:#ffffff !important" transform="translate(-92.2578125, -130.5234375)"><rect/><foreignObject width="184.515625" height="281.046875"><div style="color: rgb(255, 255, 255) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#ffffff !important" class="nodeLabel "><p></p><div style="font-weight: bold">SQLite + FTS5 Database</div><div style="font-size: 70%; margin-top: 0px">[Container: SQLite with FTS5]</div><div style="font-size: 80%; margin-top:10px">Durable complete<br />cleaned-text, relational, and<br />full-text authority for<br />migration ledger, sources,<br />documents, visits, capture<br />observations, URL claims,<br />visit events, snapshots,<br />chunks, chunks_fts, media<br />provenance/tasks, blob<br />lifecycle records, policy<br />rules, audit events, and<br />deletion receipts.</div><p></p></span></div></foreignObject></g></g></g></g></g></g></g></g></g><defs><filter id="my-svg-drop-shadow" height="130%" width="130%"><feDropShadow dx="4" dy="4" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs><defs><filter id="my-svg-drop-shadow-small" height="150%" width="150%"><feDropShadow dx="2" dy="2" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs></svg>