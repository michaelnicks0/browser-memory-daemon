br />that sidecars fetch as<br />page-related media.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-26-4" data-look="classic" transform="translate(674.0703125, 200.1484375)"><rect class="basic label-container" style="fill:#438dd5 !important;stroke:#2e6295 !important" x="-112.71875" y="-117.1484375" width="225.4375" height="234.296875"/><g class="label" style="color:#ffffff !important" transform="translate(-82.71875, -102.1484375)"><rect/><foreignObject width="165.4375" height="204.296875"><div style="color: rgb(255, 255, 255) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#ffffff !important" class="nodeLabel "><p></p><div style="font-weight: bold">WSL Media Worker</div><div style="font-size: 70%; margin-top: 0px">[Container: Python 3.11 CLI loop]</div><div style="font-size: 80%; margin-top:10px">Long-running systemd user<br />worker that leases<br />daemon-public media fetch<br />tasks, fetches public<br />media/HLS without Chrome<br />cookies, classifies terminal<br />states, and updates artifact<br />rows.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-29-6" data-look="classic" transform="translate(674.0703125, 642.5788421630859)"><path d="M0,15.37026337329674 a99.7578125,15.37026337329674 0,0,0 199.515625,0 a99.7578125,15.37026337329674 0,0,0 -199.515625,0 l0,292.2296383732967 a99.7578125,15.37026337329674 0,0,0 199.515625,0 l0,-292.2296383732967" class="basic label-container outer-path" style="fill:#2f95c8 !important;stroke:#20688c !important" label-offset-y="15.37026337329674" transform="translate(-99.7578125, -161.4850825599451)"/><g class="label" style="color:#ffffff !important" transform="translate(-92.2578125, -120.9296875)"><rect/><foreignObject width="184.515625" height="261.859375"><div style="color: rgb(255, 255, 255) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#ffffff !important" class="nodeLabel "><p></p><div style="font-weight: bold">SQLite + FTS5 Database</div><div style="font-size: 70%; margin-top: 0px">[Container: SQLite with FTS5]</div><div style="font-size: 80%; margin-top:10px">Durable complete<br />cleaned-text, relational, and<br />full-text authority for<br />migration ledger, sources,<br />documents, visits, capture<br />observations, URL claims,<br />visit events, snapshots,<br />chunks, chunks_fts, media<br />provenance/tasks, policy<br />rules, audit events, and<br />deletion receipts.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-31-8" data-look="classic" transform="translate(931.328125, 642.5788421630859)"><path d="M0,15.808823529411764 a107.5,15.808823529411764 0,0,0 215,0 a107.5,15.808823529411764 0,0,0 -215,0 l0,290.27757352941177 a107.5,15.808823529411764 0,0,0 215,0 l0,-290.27757352941177" class="basic label-container outer-path" style="fill:#2f95c8 !important;stroke:#20688c !important" label-offset-y="15.808823529411764" transform="translate(-107.5, -160.94761029411765)"/><g class="label" style="color:#ffffff !important" transform="translate(-100, -119.734375)"><rect/><foreignObject width="200" height="259.46875"><div style="color: rgb(255, 255, 255) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#ffffff !important" class="nodeLabel "><p></p><div style="font-weight: bold">Media Blob Cache</div><div style="font-size: 70%; margin-top: 0px">[Container: WSL or NAS-mounted filesystem]</div><div style="font-size: 80%; margin-top:10px">Bounded and disposable<br />filesystem cache for stored<br />image/video/audio blobs under<br />the configured WSL-visible<br />blob root, with<br /