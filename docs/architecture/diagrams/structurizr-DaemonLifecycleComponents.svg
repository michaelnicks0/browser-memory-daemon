form="translate(180.5, 737.0546875)"><g class="label" data-id="L_25_44_0" transform="translate(-96.3359375, -32.3984375)"><foreignObject width="192.671875" height="64.796875"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="edgeLabel "><p></p><div>Writes lifecycle identity and<br />interval-union dwell to</div><div style="font-size: 70%">[sqlite3]</div><p></p></span></div></foreignObject></g></g></g><g class="nodes"><g class="node default  " id="my-svg-flowchart-20-3" data-look="classic" transform="translate(180.5, 196.3671875)"><rect class="basic label-container" style="fill:#85bbf0 !important;stroke:#1168bd !important" x="-117.5" y="-88.3671875" width="235" height="176.734375"/><g class="label" style="color:#000000 !important" transform="translate(-87.5, -73.3671875)"><rect/><foreignObject width="175" height="146.734375"><div style="color: rgb(0, 0, 0) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#000000 !important" class="nodeLabel "><p></p><div style="font-weight: bold">HTTP Request Router</div><div style="font-size: 70%; margin-top: 0px">[Component: Python http.server]</div><div style="font-size: 80%; margin-top:10px">Routes loopback API requests,<br />serves UI assets, enforces<br />bearer auth for memory/admin<br />APIs, and applies CORS for<br />allowed origins.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-25-5" data-look="classic" transform="translate(180.5, 506.6953125)"><rect class="basic label-container" style="fill:#85bbf0 !important;stroke:#1168bd !important" x="-111.09375" y="-97.9609375" width="222.1875" height="195.921875"/><g class="label" style="color:#000000 !important" transform="translate(-81.09375, -82.9609375)"><rect/><foreignObject width="162.1875" height="165.921875"><div style="color: rgb(0, 0, 0) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#000000 !important" class="nodeLabel "><p></p><div style="font-weight: bold">Lifecycle Pipeline</div><div style="font-size: 70%; margin-top: 0px">[Component: Python + sqlite3]</div><div style="font-size: 80%; margin-top:10px">Stores claimed/resolved tab<br />lifecycle identity,<br />reconciles delayed captures,<br />validates active intervals,<br />and derives visit dwell from<br />interval unions.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-44-7" data-look="classic" transform="translate(180.5, 990.5319671630859)"><path d="M0,15.37026337329674 a99.7578125,15.37026337329674 0,0,0 199.515625,0 a99.7578125,15.37026337329674 0,0,0 -199.515625,0 l0,311.4171383732967 a99.7578125,15.37026337329674 0,0,0 199.515625,0 l0,-311.4171383732967" class="basic label-container outer-path" style="fill:#2f95c8 !important;stroke:#20688c !important" label-offset-y="15.37026337329674" transform="translate(-99.7578125, -171.0788325599451)"/><g class="label" style="color:#ffffff !important" transform="translate(-92.2578125, -130.5234375)"><rect/><foreignObject width="184.515625" height="281.046875"><div style="color: rgb(255, 255, 255) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#ffffff !important" class="nodeLabel "><p></p><div style="font-weight: bold">SQLite + FTS5 Database</div><div style="font-size: 70%; margin-top: 0px">[Container: SQLite with FTS5]</div><div style="font-size: 80%; margin-top:10px">Durable complete<br />cleaned-text, relational, and<br />full-text authority for<br />migration ledger, sources,<br />documents, visits, capture<br />observations, URL claims,<br />visit events, sna