<p></p></span></div></foreignObject></g></g><g class="edgeLabel" transform="translate(211.4375, 756.2421875)"><g class="label" data-id="L_23_29_0" transform="translate(-100, -32.3984375)"><foreignObject width="200" height="64.796875"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="edgeLabel "><p></p><div>Reads metadata and FTS from</div><div style="font-size: 70%">[SQLite FTS5]</div><p></p></span></div></foreignObject></g></g></g><g class="nodes"><g class="node default  " id="my-svg-flowchart-15-3" data-look="classic" transform="translate(211.4375, 196.3671875)"><rect class="basic label-container" style="fill:#85bbf0 !important;stroke:#1168bd !important" x="-117.5" y="-88.3671875" width="235" height="176.734375"/><g class="label" style="color:#000000 !important" transform="translate(-87.5, -73.3671875)"><rect/><foreignObject width="175" height="146.734375"><div style="color: rgb(0, 0, 0) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#000000 !important" class="nodeLabel "><p></p><div style="font-weight: bold">HTTP Request Router</div><div style="font-size: 70%; margin-top: 0px">[Component: Python http.server]</div><div style="font-size: 80%; margin-top:10px">Routes loopback API requests,<br />serves UI assets, enforces<br />bearer auth for memory/admin<br />APIs, and applies CORS for<br />allowed origins.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-23-5" data-look="classic" transform="translate(211.4375, 516.2890625)"><rect class="basic label-container" style="fill:#85bbf0 !important;stroke:#1168bd !important" x="-148.4375" y="-107.5546875" width="296.875" height="215.109375"/><g class="label" style="color:#000000 !important" transform="translate(-118.4375, -92.5546875)"><rect/><foreignObject width="236.875" height="185.109375"><div style="color: rgb(0, 0, 0) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#000000 !important" class="nodeLabel "><p></p><div style="font-weight: bold">Search and Read Model</div><div style="font-size: 70%; margin-top: 0px">[Component: Python + SQLite FTS5]</div><div style="font-size: 80%; margin-top:10px">Provides exact FTS search<br />plus SQLite-authoritative<br />text detail and<br />observation-first<br />recent/timeline/document/snapshot/media<br />views with explicit legacy<br />fallbacks.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-29-7" data-look="classic" transform="translate(211.4375, 1000.1257171630859)"><path d="M0,15.37026337329674 a99.7578125,15.37026337329674 0,0,0 199.515625,0 a99.7578125,15.37026337329674 0,0,0 -199.515625,0 l0,292.2296383732967 a99.7578125,15.37026337329674 0,0,0 199.515625,0 l0,-292.2296383732967" class="basic label-container outer-path" style="fill:#2f95c8 !important;stroke:#20688c !important" label-offset-y="15.37026337329674" transform="translate(-99.7578125, -161.4850825599451)"/><g class="label" style="color:#ffffff !important" transform="translate(-92.2578125, -120.9296875)"><rect/><foreignObject width="184.515625" height="261.859375"><div style="color: rgb(255, 255, 255) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#ffffff !important" class="nodeLabel "><p></p><div style="font-weight: bold">SQLite + FTS5 Database</div><div style="font-size: 70%; margin-top: 0px">[Container: SQLite with FTS5]</div><div style="font-size: 80%; margin-top:10px">Durable complete<br />cleaned-text, relational, and<br />full-text authority for<br />migration ledger, sources,<br />documents, visits, capture<br />observations, URL claims,<br />visit events, snapshots,<br />chunks, chunks_fts, media<br />provenance/tasks, policy<br />rules, audit events, and<br />deletion receipts.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-30-9" data-look="classic" transform="translate(468.6953125, 1000.1257171630859)"><path d="M0,15.808823529411764 a107.5,15.808823529411764 0,0,0 215,0 a107.5,15.808823529411764 0,0,0 -215,0 l0,199.15257352941177 a107.5,15.808823529411764 0,0,0 215,0 l0,-199.15257352941177" class="basic label-container outer-path" style="fill:#2f95c8 !important;stroke:#20688c !important" label-offset-y="15.808823529411764" transform="translate(-107.5, -115.38511029411765)"/><g class="label" style="color:#ffffff !important" transform="translate(-100, -74.171875)"><rect/><foreignObject width="200" height="168.34375"><div style="color: rgb(255, 255, 255) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#ffffff !important" class="nodeLabel "><p></p><div style="font-weight: bold">Legacy Clean Text Sidecars</div><div style="font-size: 70%; margin-top: 0px">[Container: WSL or NAS-mounted filesystem]</div><div style="font-size: 80%; margin-top:10px">Compatibility-only filesystem<br />evidence for pre-version-9<br />snapshots; new captures<br />create no text sidecars.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-31-11" data-look="classic" transform="translate(733.6953125, 1000.1257171630859)"><path d="M0,15.808823529411764 a107.5,15.808823529411764 0,0,0 215,0 a107.5,15.808823529411764 0,0,0 -215,0 l0,290.27757352941177 a107.5,15.808823529411764 0,0,0 215,0 l0,-290.27757352941177" class="basic label-container outer-path" style="fill:#2f95c8 !important;stroke:#20688c !important" label-offset-y="15.808823529411764" transform="translate(-107.5, -160.94761029411765)"/><g class="label" style="color:#ffffff !important" transform="translate(-100, -119.734375)"><rect/><foreignObject width="200" height="259.46875"><div style="color: rgb(255, 255, 255) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#ffffff !important" class="nodeLabel "><p></p><div style="font-weight: bold">Media Blob Cache</div><div style="font-size: 70%; margin-top: 0px">[Container: WSL or NAS-mounted filesystem]</div><div style="font-size: 80%; margin-top:10px">Bounded and disposable<br />filesystem cache for stored<br />image/video/audio blobs under<br />the configured WSL-visible<br />blob root, with<br />purge/rehydrate semantics<br />that preserve media refs,<br />hashes, status reasons, and<br />provenance when bytes are<br />absent or purged.</div><p></p></span></div></foreignObject></g></g></g></g></g></g></g></g></g><defs><filter id="my-svg-drop-shadow" height="130%" width="130%"><feDropShadow dx="4" dy="4" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs><defs><filter id="my-svg-drop-shadow-small" height="150%" width="150%"><feDropShadow dx="2" dy="2" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs></svg>