<text text-anchor="start" x="91.5" y="-1073.86" font-family="Arial" font-size="24.00" fill="#ffffff">tab state, minimal CDP capture</text>
<text text-anchor="start" x="102.5" y="-1049.86" font-family="Arial" font-size="24.00" fill="#ffffff">context, aggregate telemetry,</text>
<text text-anchor="start" x="90.5" y="-1025.86" font-family="Arial" font-size="24.00" fill="#ffffff">and one&#45;version queue fallback</text>
<text text-anchor="start" x="234" y="-1001.86" font-family="Arial" font-size="24.00" fill="#ffffff">only.</text>
