<text text-anchor="start" x="228" y="-412.3" font-family="Arial" font-size="24.00" fill="#000000">redaction&#45;safe</text>
<text text-anchor="start" x="199.5" y="-388.3" font-family="Arial" font-size="24.00" fill="#000000">route/status/latency</text>
<text text-anchor="start" x="156" y="-364.3" font-family="Arial" font-size="24.00" fill="#000000">telemetry, serves UI assets,</text>
<text text-anchor="start" x="175" y="-340.3" font-family="Arial" font-size="24.00" fill="#000000">enforces bearer auth for</text>
<text text-anchor="start" x="128" y="-316.3" font-family="Arial" font-size="24.00" fill="#000000">memory/admin APIs, and applies</text>
<text text-anchor="start" x="166" y="-292.3" font-family="Arial" font-size="24.00" fill="#000000">CORS for allowed origins.</text>
</g>
