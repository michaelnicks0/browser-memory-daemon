div></foreignObject></g></g></g><g class="nodes"><g class="node default  " id="my-svg-flowchart-43-3" data-look="classic" transform="translate(385.015625, 245.546875)"><rect class="basic label-container" style="fill:#85bbf0 !important;stroke:#1168bd !important" x="-130" y="-137.546875" width="260" height="275.09375"/><g class="label" style="color:#000000 !important" transform="translate(-100, -122.546875)"><rect/><foreignObject width="200" height="245.09375"><div style="color: rgb(0, 0, 0) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#000000 !important" class="nodeLabel "><p></p><div style="font-weight: bold">Backup and Restore Operator</div><div style="font-size: 70%; margin-top: 0px">[Component: Python sqlite3 + filesystem]</div><div style="font-size: 80%; margin-top:10px">Creates dry-run-first SQLite<br />online backup bundles with<br />redaction-safe SHA-256<br />manifests and verifies them<br />into absent runtime roots;<br />optionally carries referenced<br />derivatives and excludes<br />media/spool/secrets.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-44-5" data-look="classic" transform="translate(142.7578125, 792.9694671630859)"><path d="M0,15.37026337329674 a99.7578125,15.37026337329674 0,0,0 199.515625,0 a99.7578125,15.37026337329674 0,0,0 -199.515625,0 l0,311.4171383732967 a99.7578125,15.37026337329674 0,0,0 199.515625,0 l0,-311.4171383732967" class="basic label-container outer-path" style="fill:#2f95c8 !important;stroke:#20688c !important" label-offset-y="15.37026337329674" transform="translate(-99.7578125, -171.0788325599451)"/><g class="label" style="color:#ffffff !important" transform="translate(-92.2578125, -130.5234375)"><rect/><foreignObject width="184.515625" height="281.046875"><div style="color: rgb(255, 255, 255) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#ffffff !important" class="nodeLabel "><p></p><div style="font-weight: bold">SQLite + FTS5 Database</div><div style="font-size: 70%; margin-top: 0px">[Container: SQLite with FTS5]</div><div style="font-size: 80%; margin-top:10px">Durable complete<br />cleaned-text, relational, and<br />full-text authority for<br />migration ledger, sources,<br />documents, visits, capture<br />observations, URL claims,<br />visit events, snapshots,<br />chunks, chunks_fts, media<br />provenance/tasks, blob<br />lifecycle records, policy<br />rules, audit events, and<br />deletion receipts.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-45-7" data-look="classic" transform="translate(385.015625, 792.9694671630859)"><path d="M0,14.919354838709676 a92.5,14.919354838709676 0,0,0 185,0 a92.5,14.919354838709676 0,0,0 -185,0 l0,176.65372983870967 a92.5,14.919354838709676 0,0,0 185,0 l0,-176.65372983870967" class="basic label-container outer-path" style="fill:#2f95c8 !important;stroke:#20688c !important" label-offset-y="14.919354838709676" transform="translate(-92.5, -103.24621975806451)"/><g class="label" style="color:#ffffff !important" transform="translate(-85, -63.3671875)"><rect/><foreignObject width="170" height="146.734375"><div style="color: rgb(255, 255, 255) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#ffffff !important" class="nodeLabel "><p></p><div style="font-weight: bold">Local Derivative Store</div><div style="font-size: 70%; margin-top: 0px">[Container: WSL local filesystem]</div><div style="font-size: 80%; margin-top:10px">Reconstructible compatibility<br />evidence such as<br />pre-version-9 clean-text<br />sidecars; new captures create<br />no text sidecars.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-48-9" data-look="classic" transform="translate(620.8125, 792.9694671630859)"><path d="M0,14.970915655400661 a93.296875,14.970915655400661 0,0,0 186.59375,0 a93.296875,14.970915655400661 0,0,0 -186.59375,0 l0,234.26779065540066 a93.296875,14.970915655400661 0,0,0 186.59375,0 l0,-234.26779065540066" class="basic label-container outer-path" style="fill:#2f95c8 !important;stroke:#20688c !important" label-offset-y="14.970915655400661" transform="translate(-93.296875, -132.104810983101)"/><g class="label" style="color:#ffffff !important" transform="translate(-85.796875, -92.1484375)"><rect/><foreignObject width="171.59375" height="204.296875"><div style="color: rgb(255, 255, 255) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#ffffff !important" class="nodeLabel "><p></p><div style="font-weight: bold">Local Backup Bundles</div><div style="font-size: 70%; margin-top: 0px">[Container: Local filesystem]</div><div style="font-size: 80%; margin-top:10px">Operator-selected local<br />directories containing an<br />online SQLite snapshot,<br />redaction-safe hash manifest,<br />and optional referenced<br />derivatives; media, spool,<br />and secrets excluded by<br />default.</div><p></p></span></div></foreignObject></g></g></g></g></g></g></g></g></g><defs><filter id="my-svg-drop-shadow" height="130%" width="130%"><feDropShadow dx="4" dy="4" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs><defs><filter id="my-svg-drop-shadow-small" height="150%" width="150%"><feDropShadow dx="2" dy="2" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs></svg>