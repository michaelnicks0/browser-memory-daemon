.09375"/><g class="label" style="color:#000000 !important" transform="translate(-100, -110.546875)"><rect/><foreignObject width="200" height="221.09375"><div style="color: rgb(0, 0, 0) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#000000 !important" class="nodeLabel "><p></p><div style="font-weight: bold">HTTP Request Router</div><div style="font-size: 70%; margin-top: 0px">[Component: Python http.server + route descriptors]</div><div style="font-size: 80%; margin-top:10px">Matches immutable method/path<br />descriptors with static<br />precedence, routes loopback<br />API requests, serves UI<br />assets, enforces bearer auth<br />for memory/admin APIs, and<br />applies CORS for allowed<br />origins.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-25-5" data-look="classic" transform="translate(415.53125, 571.4609375)"><rect class="basic label-container" style="fill:#85bbf0 !important;stroke:#1168bd !important" x="-110.03125" y="-88.3671875" width="220.0625" height="176.734375"/><g class="label" style="color:#000000 !important" transform="translate(-80.03125, -73.3671875)"><rect/><foreignObject width="160.0625" height="146.734375"><div style="color: rgb(0, 0, 0) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#000000 !important" class="nodeLabel "><p></p><div style="font-weight: bold">Policy Engine</div><div style="font-size: 70%; margin-top: 0px">[Component: Python]</div><div style="font-size: 80%; margin-top:10px">Evaluates<br />all/recall/balanced/strict<br />capture mode decisions and<br />redacts URL/title/body text<br />outside all mode.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-26-7" data-look="classic" transform="translate(293.015625, 886.6015625)"><rect class="basic label-container" style="fill:#85bbf0 !important;stroke:#1168bd !important" x="-106.03125" y="-78.7734375" width="212.0625" height="157.546875"/><g class="label" style="color:#000000 !important" transform="translate(-76.03125, -63.7734375)"><rect/><foreignObject width="152.0625" height="127.546875"><div style="color: rgb(0, 0, 0) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#000000 !important" class="nodeLabel "><p></p><div style="font-weight: bold">Policy Store</div><div style="font-size: 70%; margin-top: 0px">[Component: Python + SQLite]</div><div style="font-size: 80%; margin-top:10px">Persists and evaluates<br />explicit local block-domain<br />and URL-prefix rules for<br />every policy mode.</div><p></p></span></div></foreignObject></g></g></g></g></g></g></g></g></g><defs><filter id="my-svg-drop-shadow" height="130%" width="130%"><feDropShadow dx="4" dy="4" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs><defs><filter id="my-svg-drop-shadow-small" height="150%" width="150%"><feDropShadow dx="2" dy="2" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs></svg>