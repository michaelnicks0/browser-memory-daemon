" data-edge="true" data-et="edge" data-id="L_26_27_0" data-points="W3sieCI6Mzk1LjUzMTI1LCJ5IjoxMTU1LjI1fSx7IngiOjM5NS41MzEyNSwieSI6MTIyOS4yNX0seyJ4IjozMzYuMTg3NDUwNDYwMjQwMzcsInkiOjEzMDMuMjV9XQ==" data-look="classic" marker-end="url(#my-svg_flowchart-v2-pointEnd)"/></g><g class="edgeLabels"><g class="edgeLabel" transform="translate(273.015625, 483.84375)"><g class="label" data-id="L_23_24_0" transform="translate(-100, -48)"><foreignObject width="200" height="96"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="edgeLabel "><p></p><div>Invokes explicit<br />request-independent use cases<br />through</div><div style="font-size: 70%"></div><p></p></span></div></foreignObject></g></g><g class="edgeLabel" transform="translate(395.53125, 916.515625)"><g class="label" data-id="L_24_26_0" transform="translate(-99.6015625, -12)"><foreignObject width="199.203125" height="24"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="edgeLabel "><p></p><div>Gets capture decisions from</div><div style="font-size: 70%"></div><p></p></span></div></foreignObject></g></g><g class="edgeLabel" transform="translate(150.5, 1066.8828125)"><g class="label" data-id="L_24_27_0" transform="translate(-100, -24)"><foreignObject width="200" height="48"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="edgeLabel "><p></p><div>Manages policy rules through</div><div style="font-size: 70%"></div><p></p></span></div></foreignObject></g></g><g class="edgeLabel" transform="translate(395.53125, 1229.25)"><g class="label" data-id="L_26_27_0" transform="translate(-95.59375, -24)"><foreignObject width="191.1875" height="48"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="edgeLabel "><p></p><div>Combines static mode with<br />rules from</div><div style="font-size: 70%"></div><p></p></span></div></foreignObject></g></g></g><g class="nodes"><g class="node default  " id="my-svg-flowchart-23-2" data-look="classic" transform="translate(273.015625, 221.921875)"><rect class="basic label-container" style="fill:#85bbf0 !important;stroke:#1168bd !important" x="-130" y="-163.921875" width="260" height="327.84375"/><g class="label" style="color:#000000 !important" transform="translate(-100, -148.921875)"><rect/><foreignObject width="200" height="297.84375"><div style="color: rgb(0, 0, 0) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#000000 !important" class="nodeLabel "><p></p><div style="font-weight: bold">HTTP Request Router</div><div style="font-size: 70%; margin-top: 0px">[Component: Python http.server + route descriptors]</div><div style="font-size: 80%; margin-top:10px">Adapts BaseHTTPRequestHandler<br />requests through immutable<br />method/path descriptors with<br />static precedence; owns auth,<br />parsing, compatible<br />status/error responses,<br />request IDs, common security<br />headers, redaction-safe<br />telemetry, bounded response<br />streaming, disconnect<br />cleanup, CORS, and finite UI<br />assets.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-24-4" data-look="classic" transform="translate(273.015625, 718.1796875)"><rect class="basic label-container" style="fill:#85bbf0 !important;stroke:#1168bd !important" x="-117.515625" y="-136.3359375" width="235.03125" height="272.671875"/><g class="label" style="color:#000000 !important" transform="translate(-87.515625, -121.3359375)"><rect/><foreignObject width="175.03125" height="242.671875"><div style="color: rgb(0, 0, 0) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#000000 !important" class="nodeLabel "><p></p><div style="font-weight: bold">Application Use Cases</div><div style="font-size: 70%; margin-top: 0px">[Component: Python]</div><div style="font-size: 80%; margin-top:10px">Provides request-independent<br />capture, lifecycle, read,<br />forget, policy, doctor, and<br />media use cases; owns<br />database-ready checks,<br />transaction/audit boundaries,<br />asynchronous media kickoff,<br />and upload/download resource<br />leases without importing HTTP<br />request or response types.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-26-6" data-look="classic" transform="translate(395.53125, 1066.8828125)"><rect class="basic label-container" style="fill:#85bbf0 !important;stroke:#1168bd !important" x="-110.03125" y="-88.3671875" width="220.0625" height="176.734375"/><g class="label" style="color:#000000 !important" transform="translate(-80.03125, -73.3671875)"><rect/><foreignObject width="160.0625" height="146.734375"><div style="color: rgb(0, 0, 0) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#000000 !important" class="nodeLabel "><p></p><div style="font-weight: bold">Policy Engine</div><div style="font-size: 70%; margin-top: 0px">[Component: Python]</div><div style="font-size: 80%; margin-top:10px">Evaluates<br />all/recall/balanced/strict<br />capture mode decisions and<br />redacts URL/title/body text<br />outside all mode.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-27-8" data-look="classic" transform="translate(273.015625, 1382.0234375)"><rect class="basic label-container" style="fill:#85bbf0 !important;stroke:#1168bd !important" x="-106.03125" y="-78.7734375" width="212.0625" height="157.546875"/><g class="label" style="color:#000000 !important" transform="translate(-76.03125, -63.7734375)"><rect/><foreignObject width="152.0625" height="127.546875"><div style="color: rgb(0, 0, 0) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#000000 !important" class="nodeLabel "><p></p><div style="font-weight: bold">Policy Store</div><div style="font-size: 70%; margin-top: 0px">[Component: Python + SQLite]</div><div style="font-size: 80%; margin-top:10px">Persists and evaluates<br />explicit local block-domain<br />and URL-prefix rules for<br />every policy mode.</div><p></p></span></div></foreignObject></g></g></g></g></g></g></g></g></g><defs><filter id="my-svg-drop-shadow" height="130%" width="130%"><feDropShadow dx="4" dy="4" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs><defs><filter id="my-svg-drop-shadow-small" height="150%" width="150%"><feDropShadow dx="2" dy="2" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs></svg>