ites complete<br />cleaned text, capture rows,<br />and FTS to</div><div style="font-size: 70%">[sqlite3]</div><p></p></span></div></foreignObject></g></g><g class="edgeLabel" transform="translate(212.140625, 358.734375)"><g class="label" data-id="L_16_20_0" transform="translate(-100, -24)"><foreignObject width="200" height="48"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="edgeLabel "><p></p><div>Routes accepted captures to</div><div style="font-size: 70%"></div><p></p></span></div></foreignObject></g></g></g><g class="nodes"><g class="node default  " id="my-svg-flowchart-16-3" data-look="classic" transform="translate(212.140625, 196.3671875)"><rect class="basic label-container" style="fill:#85bbf0 !important;stroke:#1168bd !important" x="-117.5" y="-88.3671875" width="235" height="176.734375"/><g class="label" style="color:#000000 !important" transform="translate(-87.5, -73.3671875)"><rect/><foreignObject width="175" height="146.734375"><div style="color: rgb(0, 0, 0) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#000000 !important" class="nodeLabel "><p></p><div style="font-weight: bold">HTTP Request Router</div><div style="font-size: 70%; margin-top: 0px">[Component: Python http.server]</div><div style="font-size: 80%; margin-top:10px">Routes loopback API requests,<br />serves UI assets, enforces<br />bearer auth for memory/admin<br />APIs, and applies CORS for<br />allowed origins.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-20-5" data-look="classic" transform="translate(212.140625, 569.0703125)"><rect class="basic label-container" style="fill:#85bbf0 !important;stroke:#1168bd !important" x="-149.140625" y="-136.3359375" width="298.28125" height="272.671875"/><g class="label" style="color:#000000 !important" transform="translate(-119.140625, -121.3359375)"><rect/><foreignObject width="238.28125" height="242.671875"><div style="color: rgb(0, 0, 0) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#000000 !important" class="nodeLabel "><p></p><div style="font-weight: bold">Ingest Pipeline</div><div style="font-size: 70%; margin-top: 0px">[Component: Python + sqlite3]</div><div style="font-size: 80%; margin-top:10px">Normalizes observed URLs,<br />computes document/snapshot<br />IDs, atomically stores<br />complete cleaned text plus<br />visits/observations/snapshots/chunks/FTS<br />rows, records<br />non-authoritative URL claims,<br />and links media references<br />without touching blob<br />storage.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-40-7" data-look="classic" transform="translate(212.140625, 1115.281967163086)"><path d="M0,15.37026337329674 a99.7578125,15.37026337329674 0,0,0 199.515625,0 a99.7578125,15.37026337329674 0,0,0 -199.515625,0 l0,311.4171383732967 a99.7578125,15.37026337329674 0,0,0 199.515625,0 l0,-311.4171383732967" class="basic label-container outer-path" style="fill:#2f95c8 !important;stroke:#20688c !important" label-offset-y="15.37026337329674" transform="translate(-99.7578125, -171.0788325599451)"/><g class="label" style="color:#ffffff !important" transform="translate(-92.2578125, -130.5234375)"><rect/><foreignObject width="184.515625" height="281.046875"><div style="color: rgb(255, 255, 255) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#ffffff !important" class="nodeLabel "><p></p><div style="font-weight: bold">SQLite + FTS5 Database</div><div style="font-size: 70%; margin-top: 0px">[Container: SQLite with FTS5]</div><div style="font-size: 80%; margin-top:10px">Durable complete<br />cleaned-text, relational, and<br />full-text authority for<br />migration ledger, sources,<br />documents, visits, capture<br />observations, URL claims,<br />visit events, snapshots,<br />chunks, chunks_fts, media<br />provenance/tasks, blob<br />lifecycle records, policy<br />rules, audit events, and<br />deletion receipts.</div><p></p></span></div></foreignObject></g></g></g></g></g></g></g></g></g><defs><filter id="my-svg-drop-shadow" height="130%" width="130%"><feDropShadow dx="4" dy="4" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs><defs><filter id="my-svg-drop-shadow-small" height="150%" width="150%"><feDropShadow dx="2" dy="2" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs></svg>