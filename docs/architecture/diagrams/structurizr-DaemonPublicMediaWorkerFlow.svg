ww.w3.org/1999/xhtml" class="labelBkg" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="edgeLabel "><p></p><div>4. Marks task/artifact<br />stored, retrying, skipped,<br />expired, or failed with<br />reason</div><div style="font-size: 70%">[sqlite3]</div><p></p></span></div></foreignObject></g></g></g><g class="nodes"><g class="node default  " id="my-svg-flowchart-3-8" data-look="classic" transform="translate(173, 687.6351318359375)"><rect class="basic label-container" style="fill:#999999 !important;stroke:#6b6b6b !important" x="-130" y="-100.3671875" width="260" height="200.734375"/><g class="label" style="color:#ffffff !important" transform="translate(-100, -85.3671875)"><rect/><foreignObject width="200" height="170.734375"><div style="color: rgb(255, 255, 255) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#ffffff !important" class="nodeLabel "><p></p><div style="font-weight: bold">Web Sites and Media Origins</div><div style="font-size: 70%; margin-top: 0px">[Software System]</div><div style="font-size: 80%; margin-top:10px">External web pages,<br />image/video URLs, and media<br />CDNs that Chrome loads or<br />that sidecars fetch as<br />page-related media.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-45-2" data-look="classic" transform="translate(780.11328125, 219.3359375)"><rect class="basic label-container" style="fill:#438dd5 !important;stroke:#2e6295 !important" x="-116.0859375" y="-136.3359375" width="232.171875" height="272.671875"/><g class="label" style="color:#ffffff !important" transform="translate(-86.0859375, -121.3359375)"><rect/><foreignObject width="172.171875" height="242.671875"><div style="color: rgb(255, 255, 255) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#ffffff !important" class="nodeLabel "><p></p><div style="font-weight: bold">WSL Media Worker</div><div style="font-size: 70%; margin-top: 0px">[Container: Python 3.11 CLI loop]</div><div style="font-size: 80%; margin-top:10px">Long-running systemd user<br />worker that loads<br />storage/media modules<br />in-process, first drains one<br />bounded spool-recovery batch<br />when the guarded final root<br />is ready, then leases<br />daemon-public media fetch<br />tasks without calling the<br />HTTP daemon.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-57-4" data-look="classic" transform="translate(791.78515625, 687.6351318359375)"><path d="M0,15.37026337329674 a99.7578125,15.37026337329674 0,0,0 199.515625,0 a99.7578125,15.37026337329674 0,0,0 -199.515625,0 l0,177.10463837329675 a99.7578125,15.37026337329674 0,0,0 199.515625,0 l0,-177.10463837329675" class="basic label-container outer-path" style="fill:#2f95c8 !important;stroke:#20688c !important" label-offset-y="15.37026337329674" transform="translate(-99.7578125, -103.92258255994511)"/><g class="label" style="color:#ffffff !important" transform="translate(-92.2578125, -63.3671875)"><rect/><foreignObject width="184.515625" height="146.734375"><div style="color: rgb(255, 255, 255) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#ffffff !important" class="nodeLabel "><p></p><div style="font-weight: bold">SQLite + FTS5 Database</div><div style="font-size: 70%; margin-top: 0px">[Container: SQLite with FTS5]</div><div style="font-size: 80%; margin-top:10px">Durable text/metadata<br />authority including migration<br />ledger, capture observations,<br />and immutable observation<br />ingest sequences.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-59-6" data-look="classic" transform="translate(1115.93359375, 687.6351318359375)"><path d="M0,15.808823529411764 a107.5,15.808823529411764 0,0,0 215,0 a107.5,15.808823529411764 0,0,0 -215,0 l0,256.71507352941177 a107.5,15.808823529411764 0,0,0 215,0 l0,-256.71507352941177" class="basic label-container outer-path" style="fill:#2f95c8 !important;stroke:#20688c !important" label-offset-y="15.808823529411764" transform="translate(-107.5, -144.16636029411765)"/><g class="label" style="color:#ffffff !important" transform="translate(-100, -102.953125)"><rect/><foreignObject width="200" height="225.90625"><div style="color: rgb(255, 255, 255) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#ffffff !important" class="nodeLabel "><p></p><div style="font-weight: bold">Guarded Media Blob Cache</div><div style="font-size: 70%; margin-top: 0px">[Container: WSL-visible local or NAS-mounted filesystem]</div><div style="font-size: 80%; margin-top:10px">Bounded disposable<br />image/video/audio bytes under<br />the configured media root;<br />explicit external roots<br />require mount and<br />identity-marker proof before<br />access.</div><p></p></span></div></foreignObject></g></g></g></g></g></g></g><defs><filter id="my-svg-drop-shadow" height="130%" width="130%"><feDropShadow dx="4" dy="4" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs><defs><filter id="my-svg-drop-shadow-small" height="150%" width="150%"><feDropShadow dx="2" dy="2" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs></svg>