5"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="edgeLabel "><p></p><div>4. Marks task/artifact<br />stored, retrying, skipped,<br />expired, or failed with<br />reason</div><div style="font-size: 70%">[sqlite3]</div><p></p></span></div></foreignObject></g></g></g><g class="nodes"><g class="node default  " id="my-svg-flowchart-3-8" data-look="classic" transform="translate(173, 637.7975921630859)"><rect class="basic label-container" style="fill:#999999 !important;stroke:#6b6b6b !important" x="-130" y="-100.3671875" width="260" height="200.734375"/><g class="label" style="color:#ffffff !important" transform="translate(-100, -85.3671875)"><rect/><foreignObject width="200" height="170.734375"><div style="color: rgb(255, 255, 255) !important; display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#ffffff !important" class="nodeLabel "><p></p><div style="font-weight: bold">Web Sites and Media Origins</div><div style="font-size: 70%; margin-top: 0px">[Software System]</div><div style="font-size: 80%; margin-top:10px">External web pages,<br />image/video URLs, and media<br />CDNs that Chrome loads or<br />that sidecars fetch as<br />page-related media.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-24-2" data-look="classic" transform="translate(780.11328125, 200.1484375)"><rect class="basic label-container" style="fill:#438dd5 !important;stroke:#2e6295 !important" x="-112.71875" y="-117.1484375" width="225.4375" height="234.296875"/><g class="label" style="color:#ffffff !important" transform="translate(-82.71875, -102.1484375)"><rect/><foreignObject width="165.4375" height="204.296875"><div style="color: rgb(255, 255, 255) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#ffffff !important" class="nodeLabel "><p></p><div style="font-weight: bold">WSL Media Worker</div><div style="font-size: 70%; margin-top: 0px">[Container: Python 3.11 CLI loop]</div><div style="font-size: 80%; margin-top:10px">Long-running systemd user<br />worker that leases<br />daemon-public media fetch<br />tasks, fetches public<br />media/HLS without Chrome<br />cookies, classifies terminal<br />states, and updates artifact<br />rows.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-27-4" data-look="classic" transform="translate(782.87109375, 637.7975921630859)"><path d="M0,15.37026337329674 a99.7578125,15.37026337329674 0,0,0 199.515625,0 a99.7578125,15.37026337329674 0,0,0 -199.515625,0 l0,234.66713837329675 a99.7578125,15.37026337329674 0,0,0 199.515625,0 l0,-234.66713837329675" class="basic label-container outer-path" style="fill:#2f95c8 !important;stroke:#20688c !important" label-offset-y="15.37026337329674" transform="translate(-99.7578125, -132.7038325599451)"/><g class="label" style="color:#ffffff !important" transform="translate(-92.2578125, -92.1484375)"><rect/><foreignObject width="184.515625" height="204.296875"><div style="color: rgb(255, 255, 255) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#ffffff !important" class="nodeLabel "><p></p><div style="font-weight: bold">SQLite + FTS5 Database</div><div style="font-size: 70%; margin-top: 0px">[Container: SQLite with FTS5]</div><div style="font-size: 80%; margin-top:10px">Durable relational and<br />full-text store for sources,<br />documents, visits, visit<br />events, snapshots, chunks,<br />chunks_fts, media artifacts,<br />media fetch tasks, policy<br />rules, audit events, and<br />deletion receipts.</div><p></p></span></div></foreignObject></g></g><g class="node default  " id="my-svg-flowchart-29-6" data-look="classic" transform="translate(1107.01953125, 637.7975921630859)"><path d="M0,14.732005339357224 a89.671875,14.732005339357224 0,0,0 179.34375,0 a89.671875,14.732005339357224 0,0,0 -179.34375,0 l0,234.02888033935722 a89.671875,14.732005339357224 0,0,0 179.34375,0 l0,-234.02888033935722" class="basic label-container outer-path" style="fill:#2f95c8 !important;stroke:#20688c !important" label-offset-y="14.732005339357224" transform="translate(-89.671875, -131.74644550903582)"/><g class="label" style="color:#ffffff !important" transform="translate(-82.171875, -92.1484375)"><rect/><foreignObject width="164.34375" height="204.296875"><div style="color: rgb(255, 255, 255) !important; display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;" xmlns="http://www.w3.org/1999/xhtml"><span style="color:#ffffff !important" class="nodeLabel "><p></p><div style="font-weight: bold">Media Blob Cache</div><div style="font-size: 70%; margin-top: 0px">[Container: WSL filesystem]</div><div style="font-size: 80%; margin-top:10px">Bounded and disposable<br />filesystem cache for stored<br />image/video/audio blobs with<br />purge/rehydrate semantics<br />that preserve media refs,<br />hashes, status reasons, and<br />provenance when bytes are<br />absent or purged.</div><p></p></span></div></foreignObject></g></g></g></g></g></g></g><defs><filter id="my-svg-drop-shadow" height="130%" width="130%"><feDropShadow dx="4" dy="4" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs><defs><filter id="my-svg-drop-shadow-small" height="150%" width="150%"><feDropShadow dx="2" dy="2" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs></svg>