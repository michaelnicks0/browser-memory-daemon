<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Browser Memory Daemon high-level architecture</title>
  <desc id="desc">Windows Chrome captures page text and media references, sends them through a bearer-token loopback API, and stores searchable memory in WSL-owned SQLite, FTS, and blob stores. Operator UI, CLI, and real Chrome e2e tests remain local.</desc>
  <defs>
    <radialGradient id="bgGlowA" cx="12%" cy="4%" r="64%">
      <stop offset="0" stop-color="#123b66" stop-opacity="0.72"/>
      <stop offset="0.46" stop-color="#0a1426" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#060d18" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlowB" cx="92%" cy="8%" r="62%">
      <stop offset="0" stop-color="#2b5fa8" stop-opacity="0.34"/>
      <stop offset="0.58" stop-color="#0a1426" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#060d18" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panelFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10213d" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#0b172b" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="cardFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#152846"/>
      <stop offset="1" stop-color="#101d34"/>
    </linearGradient>
    <linearGradient id="apiFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16335c"/>
      <stop offset="1" stop-color="#102746"/>
    </linearGradient>
    <linearGradient id="storeFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#173454"/>
      <stop offset="1" stop-color="#11263f"/>
    </linearGradient>
    <linearGradient id="greenFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#143b34"/>
      <stop offset="1" stop-color="#102b2a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <filter id="smallShadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <marker id="arrowBlue" markerWidth="13" markerHeight="13" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5aa6ff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="13" markerHeight="13" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5be19c"/>
    </marker>
    <marker id="arrowViolet" markerWidth="13" markerHeight="13" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b79bff"/>
    </marker>
    <style>
      .bg { fill:#060d18; }
      .grid { stroke:#20324f; stroke-width:1; opacity:.16; }
      .title { font: 800 36px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif; fill:#edf5ff; letter-spacing:-.02em; }
      .subtitle { font: 500 17px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif; fill:#aebfde; }
      .eyebrow { font: 800 12px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif; fill:#52d4ff; letter-spacing:.16em; text-transform:uppercase; }
      .panel-title { font: 800 17px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif; fill:#dceaff; }
      .panel-sub { font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif; fill:#7fdcff; letter-spacing:.08em; text-transform:uppercase; }
      .node-title { font: 800 18px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif; fill:#edf5ff; }
      .node-sub { font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif; fill:#c0d2f0; }
      .node-note { font: 700 12.5px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill:#e2eeff; }
      .label { font: 900 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif; fill:#06101f; letter-spacing:.04em; text-transform:uppercase; }
      .legend { font: 700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif; fill:#cfe0f7; }
      .legend-muted { font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif; fill:#9fb1cc; }
      .footer { font: 800 15.5px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif; fill:#d7e7ff; }
      .panel { fill:url(#panelFill); stroke:#2c4060; stroke-width:1.4; }
      .card { fill:url(#cardFill); stroke:#2c4060; stroke-width:1.25; }
      .card-blue { fill:url(#apiFill); stroke:#3b82f6; stroke-width:1.4; }
      .card-green { fill:url(#greenFill); stroke:#2fbb82; stroke-width:1.4; }
      .card-store { fill:url(#storeFill); stroke:#52d4ff; stroke-width:1.35; }
      .lane-blue { stroke:#5aa6ff; stroke-width:4; fill:none; marker-end:url(#arrowBlue); stroke-linecap:round; stroke-linejoin:round; }
      .lane-green { stroke:#5be19c; stroke-width:4.4; fill:none; marker-end:url(#arrowGreen); stroke-linecap:round; stroke-linejoin:round; }
      .lane-violet { stroke:#b79bff; stroke-width:3.4; fill:none; stroke-dasharray:10 8; marker-end:url(#arrowViolet); stroke-linecap:round; stroke-linejoin:round; }
      .dim-line { stroke:#2c4060; stroke-width:1.2; fill:none; opacity:.75; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="900"/>
  <path d="M 0 0 H 1400 V 900 H 0 Z" fill="url(#bgGlowA)"/>
  <path d="M 0 0 H 1400 V 900 H 0 Z" fill="url(#bgGlowB)"/>
  <g opacity="0.55">
    <path class="grid" d="M 80 0 V 900 M 160 0 V 900 M 240 0 V 900 M 320 0 V 900 M 400 0 V 900 M 480 0 V 900 M 560 0 V 900 M 640 0 V 900 M 720 0 V 900 M 800 0 V 900 M 880 0 V 900 M 960 0 V 900 M 1040 0 V 900 M 1120 0 V 900 M 1200 0 V 900 M 1280 0 V 900"/>
    <path class="grid" d="M 0 80 H 1400 M 0 160 H 1400 M 0 240 H 1400 M 0 320 H 1400 M 0 400 H 1400 M 0 480 H 1400 M 0 560 H 1400 M 0 640 H 1400 M 0 720 H 1400 M 0 800 H 1400"/>
  </g>

  <text x="54" y="62" class="eyebrow">Browser Memory Daemon · high-level architecture</text>
  <text x="54" y="106" class="title">Windows Chrome captures. WSL remembers.</text>
  <text x="54" y="135" class="subtitle">Local bearer-token bridge, SQLite + FTS5 recall, bounded media sidecars, and explicit forget controls.</text>

  <g transform="translate(944 46)">
    <rect x="0" y="0" width="402" height="92" rx="18" fill="#0b172b" stroke="#2c4060"/>
    <circle cx="26" cy="26" r="6" fill="#5aa6ff"/>
    <text x="42" y="31" class="legend">solid blue</text>
    <text x="128" y="31" class="legend-muted">synchronous capture</text>
    <circle cx="26" cy="54" r="6" fill="#5be19c"/>
    <text x="42" y="59" class="legend">solid green</text>
    <text x="128" y="59" class="legend-muted">local ingest/storage</text>
    <circle cx="26" cy="80" r="6" fill="#b79bff"/>
    <text x="42" y="85" class="legend">dashed violet</text>
    <text x="146" y="85" class="legend-muted">lazy media + ops/test control</text>
  </g>

  <!-- Main panels -->
  <g filter="url(#shadow)">
    <rect x="50" y="168" width="360" height="466" rx="26" class="panel"/>
    <rect x="470" y="204" width="300" height="394" rx="26" class="panel"/>
    <rect x="830" y="168" width="520" height="466" rx="26" class="panel"/>
    <rect x="50" y="686" width="1300" height="150" rx="26" class="panel"/>
  </g>

  <text x="76" y="205" class="panel-sub">Windows host</text>
  <text x="76" y="231" class="panel-title">Chrome capture surface</text>
  <text x="496" y="241" class="panel-sub">localhost only</text>
  <text x="496" y="267" class="panel-title">Authenticated bridge</text>
  <text x="856" y="205" class="panel-sub">WSL runtime paths</text>
  <text x="856" y="231" class="panel-title">Durable local memory</text>
  <text x="76" y="723" class="panel-sub">Operator and verification</text>
  <text x="76" y="749" class="panel-title">Read, administer, test, and delete without leaving the workstation</text>

  <!-- Cross-panel flows behind node cards -->
  <path class="lane-blue" d="M 356 384 C 420 384 430 332 488 332"/>
  <path class="lane-violet" d="M 356 492 C 422 492 430 470 488 470"/>
  <path class="lane-green" d="M 746 362 C 784 362 800 336 856 336"/>
  <path class="lane-violet" d="M 746 480 C 794 480 802 540 858 540"/>
  <path class="lane-violet" d="M 724 742 C 740 666 842 616 938 586"/>
  <path class="lane-violet" d="M 1118 736 C 1120 664 1032 620 984 586" opacity="0.85"/>

  <!-- Flow labels -->
  <g filter="url(#smallShadow)">
    <rect x="388" y="356" width="122" height="32" rx="16" fill="#5aa6ff"/>
    <rect x="386" y="461" width="112" height="32" rx="16" fill="#b79bff"/>
    <rect x="786" y="330" width="106" height="32" rx="16" fill="#5be19c"/>
    <rect x="760" y="506" width="146" height="32" rx="16" fill="#b79bff"/>
    <rect x="786" y="622" width="124" height="32" rx="16" fill="#b79bff"/>
    <rect x="1036" y="648" width="132" height="32" rx="16" fill="#b79bff"/>
  </g>
  <text x="449" y="378" text-anchor="middle" class="label">text + refs</text>
  <text x="442" y="483" text-anchor="middle" class="label">raw blobs</text>
  <text x="839" y="352" text-anchor="middle" class="label">auth local</text>
  <text x="833" y="528" text-anchor="middle" class="label">lazy backfill</text>
  <text x="848" y="644" text-anchor="middle" class="label">ops control</text>
  <text x="1102" y="670" text-anchor="middle" class="label">e2e verify</text>

  <!-- Browser panel cards -->
  <g filter="url(#smallShadow)">
    <rect x="82" y="268" width="296" height="82" rx="17" class="card"/>
    <rect x="82" y="376" width="296" height="92" rx="17" class="card-blue"/>
    <rect x="82" y="496" width="296" height="94" rx="17" class="card"/>
  </g>
  <text x="110" y="302" class="node-title">Web pages and media origins</text>
  <text x="110" y="325" class="node-sub">HTML, visible text, images, video URLs</text>
  <text x="110" y="410" class="node-title">Chrome tab + MV3 extension</text>
  <text x="110" y="435" class="node-sub">content script, service worker, popup/options</text>
  <text x="110" y="456" class="node-sub">hidden/form/editable/script/style skips retained</text>
  <text x="110" y="530" class="node-title">Browser media sidecars</text>
  <text x="110" y="555" class="node-sub">IndexedDB queue, credentialed fetch, CDP recorder</text>
  <text x="110" y="576" class="node-note">credentials stay inside Chrome</text>
  <path class="dim-line" d="M 230 350 V 374" marker-end="url(#arrowBlue)"/>
  <path class="dim-line" d="M 230 468 V 494" marker-end="url(#arrowViolet)"/>

  <!-- Bridge panel cards -->
  <g filter="url(#smallShadow)">
    <rect x="500" y="300" width="240" height="96" rx="18" class="card-blue"/>
    <rect x="500" y="430" width="240" height="92" rx="18" class="card"/>
  </g>
  <text x="528" y="333" class="node-title">Bearer-token HTTP API</text>
  <text x="528" y="358" class="node-note">/capture · /visit-events</text>
  <text x="528" y="379" class="node-note">/media-artifacts · /forget</text>
  <text x="528" y="463" class="node-title">Local trust boundary</text>
  <text x="528" y="488" class="node-sub">binds to 127.0.0.1 by default</text>
  <text x="528" y="509" class="node-sub">CORS limited to Chrome extension + loopback</text>

  <!-- WSL panel cards -->
  <g filter="url(#smallShadow)">
    <rect x="862" y="268" width="456" height="92" rx="18" class="card-green"/>
    <rect x="862" y="390" width="210" height="86" rx="18" class="card-store"/>
    <rect x="1104" y="390" width="214" height="86" rx="18" class="card-store"/>
    <rect x="862" y="512" width="456" height="88" rx="18" class="card"/>
  </g>
  <text x="890" y="302" class="node-title">Browser Memory Daemon</text>
  <text x="890" y="327" class="node-sub">policy, ingest, exact search, local UI shell, forget receipts</text>
  <text x="890" y="348" class="node-note">no cloud vector or LLM upload path</text>
  <text x="890" y="424" class="node-title">SQLite + FTS5</text>
  <text x="890" y="449" class="node-sub">documents, visits, snapshots, chunks, media refs</text>
  <text x="1132" y="424" class="node-title">Blob stores</text>
  <text x="1132" y="449" class="node-sub">clean text + bounded media cache</text>
  <text x="890" y="546" class="node-title">Daemon media worker</text>
  <text x="890" y="571" class="node-sub">public no-cookie fetch, HLS assembly, rolling purge + rehydrate</text>
  <path class="lane-green" d="M 990 360 V 383"/>
  <path class="lane-green" d="M 1164 360 V 383"/>
  <path class="lane-violet" d="M 1212 476 C 1212 500 1160 512 1112 512"/>

  <!-- Bottom operator/test cards -->
  <g filter="url(#smallShadow)">
    <rect x="428" y="738" width="228" height="66" rx="17" class="card"/>
    <rect x="690" y="738" width="228" height="66" rx="17" class="card"/>
    <rect x="952" y="738" width="270" height="66" rx="17" class="card"/>
  </g>
  <text x="456" y="766" class="node-title">Local dashboard</text>
  <text x="456" y="789" class="node-sub">/ui token bootstrap, search, policy, forget</text>
  <text x="718" y="766" class="node-title">CLI</text>
  <text x="718" y="789" class="node-sub">search, doctor, media-cache, media-worker</text>
  <text x="980" y="766" class="node-title">Real Chrome end-to-end tests</text>
  <text x="980" y="789" class="node-sub">pytest, node:test, Chrome for Testing fixtures</text>

  <rect x="76" y="785" width="326" height="26" rx="13" fill="#0b172b" stroke="#2c4060"/>
  <text x="94" y="803" class="legend-muted">Runtime DBs, blobs, logs, tokens, and captures stay outside Git.</text>

  <rect x="50" y="846" width="1300" height="38" rx="19" fill="#0b172b" stroke="#2c4060"/>
  <text x="76" y="871" class="footer">Invariant: text and FTS capture are synchronous and authoritative; media bytes are lazy, bounded, and disposable sidecars.</text>
</svg>
