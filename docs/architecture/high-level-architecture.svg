<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 720" role="img" aria-labelledby="title desc">
  <title id="title">Browser Memory Daemon high-level architecture</title>
  <desc id="desc">A high-level architecture diagram showing web and media origins flowing into Windows Chrome, through an authenticated loopback bridge, into WSL-owned SQLite, FTS, text, and media storage, with local UI, CLI, and real Chrome verification surfaces.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#09182b"/>
      <stop offset="1" stop-color="#06101d"/>
    </linearGradient>
    <radialGradient id="glow" cx="45%" cy="10%" r="70%">
      <stop offset="0" stop-color="#163a66" stop-opacity="0.46"/>
      <stop offset="0.48" stop-color="#0a1b31" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#06101d" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000814" flood-opacity="0.38"/>
    </filter>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6cb4ff"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5be19c"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b58cff"/>
    </marker>
    <style>
      .canvas { fill: url(#bg); }
      .glow { fill: url(#glow); }
      .title { fill: #eaf2ff; font: 700 30px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: -0.02em; }
      .subtitle { fill: #9fb1cc; font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .panel { fill: rgba(20, 32, 54, 0.72); stroke: #2c4060; stroke-width: 1.4; }
      .panel-title { fill: #eaf2ff; font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.01em; }
      .node-title { fill: #f6fbff; font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .node-sub { fill: #b8c7dd; font: 500 12.5px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tag { fill: #07111f; font: 800 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.08em; }
      .external { fill: #2a1732; stroke: #ff6f9c; }
      .chrome { fill: #132a4d; stroke: #6cb4ff; }
      .bridge { fill: #0b3551; stroke: #52d4ff; }
      .wsl { fill: #0f2f26; stroke: #5be19c; }
      .ops { fill: #241b3d; stroke: #b58cff; }
      .test { fill: #3a2a12; stroke: #ffb454; }
      .node { stroke-width: 1.6; filter: url(#shadow); }
      .arrow { fill: none; stroke: #6cb4ff; stroke-width: 2.4; marker-end: url(#arrow-cyan); }
      .arrow-green { fill: none; stroke: #5be19c; stroke-width: 2.4; marker-end: url(#arrow-green); }
      .arrow-purple { fill: none; stroke: #b58cff; stroke-width: 2.2; marker-end: url(#arrow-purple); stroke-dasharray: 7 6; }
      .label-box { fill: #07111f; stroke: #263b5d; stroke-width: 1; opacity: 0.96; }
      .label { fill: #d7e7ff; font: 700 11.5px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #9fb1cc; font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </defs>

  <rect class="canvas" x="0" y="0" width="1120" height="720" rx="28"/>
  <rect class="glow" x="0" y="0" width="1120" height="720" rx="28"/>

  <text class="title" x="48" y="52">Browser Memory Daemon — high-level architecture</text>
  <text class="subtitle" x="48" y="78">Windows Chrome is the sensor. WSL owns durable recall. Everything stays local, tokened, searchable, and forgettable.</text>

  <!-- Column panels -->
  <rect class="panel" x="40" y="112" width="308" height="370" rx="22"/>
  <text class="panel-title" x="64" y="145">1. Windows Chrome browser surface</text>

  <rect class="panel" x="386" y="190" width="248" height="214" rx="22"/>
  <text class="panel-title" x="410" y="223">2. Authenticated loopback bridge</text>

  <rect class="panel" x="672" y="112" width="408" height="370" rx="22"/>
  <text class="panel-title" x="696" y="145">3. WSL-owned local memory</text>

  <rect class="panel" x="40" y="524" width="1040" height="138" rx="22"/>
  <text class="panel-title" x="64" y="557">4. Operator + verification surfaces</text>

  <!-- Chrome column -->
  <rect class="node external" x="72" y="168" width="244" height="62" rx="16"/>
  <text class="node-title" x="96" y="194">Web + media origins</text>
  <text class="node-sub" x="96" y="214">HTML · images · video URLs</text>

  <rect class="node chrome" x="72" y="260" width="244" height="66" rx="16"/>
  <text class="node-title" x="96" y="286">Daily-driver tab</text>
  <text class="node-sub" x="96" y="306">visible DOM · lifecycle · scroll</text>

  <rect class="node chrome" x="72" y="356" width="244" height="78" rx="16"/>
  <text class="node-title" x="96" y="383">MV3 extension</text>
  <text class="node-sub" x="96" y="404">content script + service worker</text>
  <text class="node-sub" x="96" y="421">capture policy · local queues</text>

  <rect class="node chrome" x="92" y="444" width="204" height="48" rx="14"/>
  <text class="node-title" x="116" y="474">Browser sidecars</text>
  <text class="node-sub" x="116" y="489">IndexedDB · CDP · blob PUTs</text>

  <!-- Bridge -->
  <rect class="node bridge" x="420" y="258" width="180" height="92" rx="18"/>
  <text class="node-title" x="446" y="290">Bearer-token</text>
  <text class="node-title" x="446" y="309">HTTP API</text>
  <text class="node-sub" x="446" y="332">/capture · /visit-events</text>
  <text class="node-sub" x="446" y="348">/media-artifacts</text>

  <!-- WSL column -->
  <rect class="node wsl" x="712" y="166" width="328" height="82" rx="18"/>
  <text class="node-title" x="738" y="194">Browser Memory Daemon</text>
  <text class="node-sub" x="738" y="215">policy · ingest · search · forget</text>
  <text class="node-sub" x="738" y="232">local UI serving · token bootstrap</text>

  <rect class="node wsl" x="712" y="280" width="154" height="84" rx="18"/>
  <text class="node-title" x="738" y="309">SQLite + FTS5</text>
  <text class="node-sub" x="738" y="330">documents · visits</text>
  <text class="node-sub" x="738" y="347">chunks · media refs</text>

  <rect class="node wsl" x="886" y="280" width="154" height="84" rx="18"/>
  <text class="node-title" x="912" y="309">Local blobs</text>
  <text class="node-sub" x="912" y="330">clean text</text>
  <text class="node-sub" x="912" y="347">bounded media cache</text>

  <rect class="node wsl" x="742" y="396" width="268" height="58" rx="16"/>
  <text class="node-title" x="768" y="424">Daemon media worker</text>
  <text class="node-sub" x="768" y="442">public backfill · purge · rehydrate</text>

  <!-- Operator nodes -->
  <rect class="node ops" x="94" y="580" width="220" height="56" rx="16"/>
  <text class="node-title" x="122" y="611">Local dashboard</text>
  <text class="node-sub" x="122" y="629">/ui tokened reads + admin</text>

  <rect class="node ops" x="450" y="580" width="220" height="56" rx="16"/>
  <text class="node-title" x="478" y="611">CLI</text>
  <text class="node-sub" x="478" y="629">search · doctor · forget</text>

  <rect class="node test" x="806" y="580" width="220" height="56" rx="16"/>
  <text class="node-title" x="834" y="611">Real Chrome e2e</text>
  <text class="node-sub" x="834" y="629">pytest · node:test · Chrome</text>

  <!-- Main flow -->
  <path class="arrow" d="M194 230 L194 252"/>
  <path class="arrow" d="M194 326 L194 348"/>
  <path class="arrow" d="M316 394 C352 394 362 304 412 304"/>
  <path class="arrow-green" d="M600 304 C630 304 646 207 704 207"/>

  <path class="arrow-green" d="M876 248 L876 272"/>
  <path class="arrow-green" d="M892 248 C930 252 953 260 963 272"/>
  <path class="arrow-green" d="M802 396 C788 385 788 378 789 366"/>
  <path class="arrow-green" d="M948 396 C964 384 964 376 963 366"/>

  <!-- Lazy media and operator verification -->
  <path class="arrow" d="M194 444 L194 434"/>
  <path class="arrow" d="M296 468 C360 468 360 338 412 334"/>
  <path class="arrow-purple" d="M876 454 C864 490 778 510 650 552 C610 565 585 570 560 576"/>
  <path class="arrow-purple" d="M204 580 C210 528 154 498 148 434"/>
  <path class="arrow-purple" d="M560 580 C594 515 690 492 758 248"/>
  <path class="arrow-purple" d="M916 580 C916 520 842 500 760 454"/>

  <!-- Labels -->
  <rect class="label-box" x="326" y="280" width="118" height="24" rx="8"/>
  <text class="label" x="339" y="297">fast text + refs</text>

  <rect class="label-box" x="612" y="278" width="88" height="24" rx="8"/>
  <text class="label" x="625" y="295">tokened local</text>

  <rect class="label-box" x="306" y="435" width="86" height="24" rx="8"/>
  <text class="label" x="319" y="452">raw blobs</text>

  <rect class="label-box" x="818" y="500" width="112" height="24" rx="8"/>
  <text class="label" x="831" y="517">public backfill</text>

  <rect x="72" y="674" width="976" height="1" fill="#253a5c" opacity="0.7"/>
  <text class="muted" x="72" y="700">Invariant: text/FTS capture is synchronous and authoritative; media bytes are lazy, bounded, disposable sidecars.</text>
</svg>
